name: CD — Deploy Contínuo

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: 🏗️ Build do Site
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 📋 Copiar site para pasta de build
        run: |
          mkdir -p build
          cp -r site/. build/
          echo "✅ Arquivos copiados:"
          ls -la build/

      - name: ✅ Validar build
        run: |
          if [ ! -f "build/index.html" ]; then
            echo "❌ ERRO: build/index.html não encontrado!"
            exit 1
          fi
          echo "✅ Build validado com sucesso!"

      - name: ⚙️ Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: 📤 Publicar artefato para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/

      - name: 📦 Artefato para download
        uses: actions/upload-artifact@v4
        with:
          name: site-buildado-${{ github.run_number }}
          path: build/
          retention-days: 14

  deploy:
    name: 🚀 Deploy no GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🌐 Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: ✅ Deploy concluído
        run: |
          echo "🎉 Site publicado com sucesso!"
          echo "🔗 URL: ${{ steps.deployment.outputs.page_url }}"
